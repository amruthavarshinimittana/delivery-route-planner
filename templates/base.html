<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Delivery Route Planner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #1a1a2e; }
    nav { background: #1a1a2e; padding: 0 2rem; display: flex; align-items: center; gap: 2rem; height: 56px; }
    nav .brand { color: #fff; font-weight: 700; font-size: 1.1rem; }
    nav .brand span { color: #2ecc71; }
    nav a { color: #aab2bd; text-decoration: none; font-size: 0.9rem; padding: 6px 12px; border-radius: 6px; }
    nav a:hover, nav a.active { background: rgba(255,255,255,0.08); color: #fff; }
    .container { max-width: 960px; margin: 2rem auto; padding: 0 1.5rem; }
    .card { background: #fff; border-radius: 12px; padding: 1.75rem; box-shadow: 0 2px 8px rgba(0,0,0,0.07); margin-bottom: 1.5rem; }
    .card h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 1.25rem; color: #1a1a2e; }
    label { font-size: 0.85rem; font-weight: 500; color: #555; display: block; margin-bottom: 4px; }
    input[type=text], input[type=number], input[type=file] { width: 100%; padding: 9px 12px; border: 1.5px solid #dde1e7; border-radius: 8px; font-size: 0.9rem; outline: none; }
    input:focus { border-color: #3498db; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .btn { padding: 10px 22px; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #1a1a2e; color: #fff; }
    .btn-danger { background: #e74c3c; color: #fff; font-size: 0.8rem; padding: 6px 14px; }
    .btn-secondary { background: #f0f4f8; color: #333; border: 1.5px solid #dde1e7; }
    .stop-row { display: grid; grid-template-columns: 1fr 140px 36px; gap: 10px; align-items: end; margin-bottom: 10px; }
    .alert { padding: 12px 16px; border-radius: 8px; font-size: 0.88rem; margin-bottom: 1rem; }
    .alert-success { background: #eafaf1; color: #1e8449; border: 1px solid #a9dfbf; }
    .alert-error { background: #fdedec; color: #a93226; border: 1px solid #f5b7b1; }
    .result-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .metric { background: #f8fafc; border-radius: 10px; padding: 1rem; text-align: center; border: 1.5px solid #eef1f5; }
    .metric .val { font-size: 1.5rem; font-weight: 700; color: #1a1a2e; }
    .metric .lbl { font-size: 0.78rem; color: #888; margin-top: 4px; }
    .stop-badge { display: inline-block; background: #eaf4fb; color: #2980b9; border-radius: 20px; padding: 4px 12px; font-size: 0.82rem; font-weight: 500; margin: 3px; }
    .arrow { color: #bbb; font-size: 1rem; margin: 0 2px; }
    .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
    .chart-grid img { width: 100%; border-radius: 8px; border: 1px solid #eee; }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    th { background: #f0f4f8; padding: 10px 12px; text-align: left; font-weight: 600; color: #555; }
    td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; }
    .badge-stops { background: #f0f4f8; color: #555; border-radius: 6px; padding: 3px 8px; font-size: 0.78rem; }
    .section-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.25rem; color: #1a1a2e; }
    .section-sub { font-size: 0.88rem; color: #888; margin-bottom: 1.5rem; }
    .csv-hint { background: #fffbea; border: 1px solid #f9e79f; border-radius: 8px; padding: 12px 16px; font-size: 0.85rem; color: #7d6608; margin-top: 1rem; }
    .csv-hint code { background: #fef9e7; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <nav>
    <div class="brand">🚚 <span>Route</span>Planner</div>
    <a href="/" class="{{ 'active' if request.endpoint == 'index' }}">Plan route</a>
    <a href="/upload" class="{{ 'active' if request.endpoint == 'upload' }}">Upload CSV</a>
    <a href="/history" class="{{ 'active' if request.endpoint == 'history' }}">History</a>
  </nav>
  <div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
